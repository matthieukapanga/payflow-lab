version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: payflow-postgres
    environment:
        POSTGRES_DB: payflow
        POSTGRES_USER: payflow_user
        POSTGRES_PASSWORD: payflow_dev_password_2026 
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgres/data 
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U payflow_user -d payflow"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 15s

  api:
    build: 
      context: ./app
      dockerfile: Dockerfile 
    container_name: payflow-api 
    ports:
      - "3000:3000"
    env_file:
      - ./.env
    depends_on:
      postgres:
        condition: service_healthy
    restart: on-failure

volumes:
  postgres_data: